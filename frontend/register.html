<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Exam Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card" style="max-width: 560px;">
      <div class="auth-logo">
        <img src="img/logo.png" alt="VESASC" style="height:80px; width:auto; margin-bottom:10px;">
        <h1>VESASC Exam Portal</h1>
        <p>Student Registration</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label>Age *</label>
          <input type="number" id="age" placeholder="Your age" min="16" max="30">
        </div>
      </div>

      <div class="form-group">
        <label>Education Level *</label>
        <select id="education">
          <option value="">Select education level</option>
          <option value="10th">10th Standard</option>
          <option value="12th">12th Standard</option>
          <option value="12th Appearing">12th Appearing</option>
          <option value="Graduate">Graduate</option>
          <option value="Post Graduate">Post Graduate</option>
        </select>
      </div>

      <div class="form-group">
        <label>Last College / School Name *</label>
        <input type="text" id="lastCollegeName" placeholder="Name of your institution">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Mobile Number *</label>
          <input type="tel" id="mobile" placeholder="10-digit mobile">
        </div>
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="password" placeholder="Minimum 6 characters">
      </div>

      <button class="btn btn-primary" id="registerBtn" onclick="handleRegister()">
        Register & Get OTP
      </button>

      <p class="text-center mt-2">
        Already registered? <a href="index.html" class="link">Login here</a>
      </p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5000/api';

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert alert-${type} show`;
    }

    async function handleRegister() {
      const name = document.getElementById('name').value.trim();
      const age = document.getElementById('age').value;
      const education = document.getElementById('education').value;
      const lastCollegeName = document.getElementById('lastCollegeName').value.trim();
      const email = document.getElementById('email').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !age || !education || !lastCollegeName || !email || !mobile || !password) {
        return showAlert('Please fill in all required fields.', 'error');
      }
      if (password.length < 6) {
        return showAlert('Password must be at least 6 characters.', 'error');
      }
      if (!/^\d{10}$/.test(mobile)) {
        return showAlert('Please enter a valid 10-digit mobile number.', 'error');
      }

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Sending OTP...';

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, age: parseInt(age), education, lastCollegeName, email, mobile, password })
        });
        const data = await res.json();

        if (!res.ok) {
          btn.disabled = false;
          btn.textContent = 'Register & Get OTP';
          return showAlert(data.message, 'error');
        }

        showAlert('OTP sent to your email! Redirecting...', 'success');
        localStorage.setItem('pendingEmail', email);
        setTimeout(() => window.location.href = 'verify-otp.html', 1500);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Register & Get OTP';
        showAlert('Cannot connect to server. Please try again.', 'error');
      }
    }
  </script>
</body>
</html>
