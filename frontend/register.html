<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MAH-CET BMS Mock Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card" style="max-width: 560px;">
      <div class="auth-logo">
        <img src="img/logo.png" alt="VESASC" style="height:80px; width:auto; margin-bottom:10px;">
        <h1>MAH-CET BMS Mock Portal</h1>
        <p>Student Registration</p>
      </div>

      <div id="alertBox" class="alert"></div>

     <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="name" placeholder="Your full name">
      </div>

      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Contact Number *</label>
          <input type="tel" id="contactNumber" placeholder="10-digit mobile">
        </div>
        <div class="form-group">
          <label>Additional Contact Number</label>
          <input type="tel" id="additionalContactNumber" placeholder="Optional">
        </div>
      </div>

      <div class="form-group">
        <label>CET Registration Number *</label>
        <input type="text" id="cetRegistrationNumber" placeholder="Your CET registration number">
      </div>

      <div class="form-group">
        <label>Password *</label>
        <div style="position:relative;">
          <input type="password" id="password" placeholder="Minimum 6 characters" style="padding-right:44px;">
          <span onclick="togglePassword()" style="
            position:absolute; right:14px; top:50%; transform:translateY(-50%);
            cursor:pointer; font-size:18px; color:#6c757d; user-select:none;
          ">👁</span>
        </div>
      </div>

      <button class="btn btn-primary" id="registerBtn" onclick="handleRegister()">
        Register & Get OTP
      </button>
      <p class="text-center mt-2">
        Already registered? <a href="index.html" class="link">Login here</a>
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.querySelector('.form-group span');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
      } else {
        input.type = 'password';
        icon.textContent = '👁';
      }
    }
    const API = 'https://vesasc-examination-app.onrender.com/api';

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert alert-${type} show`;
    }

    async function handleRegister() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const contactNumber = document.getElementById('contactNumber').value.trim();
      const additionalContactNumber = document.getElementById('additionalContactNumber').value.trim();
      const cetRegistrationNumber = document.getElementById('cetRegistrationNumber').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !contactNumber || !cetRegistrationNumber || !password) {
        return showAlert('Please fill in all required fields.', 'error');
      }
      if (password.length < 6) {
        return showAlert('Password must be at least 6 characters.', 'error');
      }
      if (!/^\d{10}$/.test(contactNumber)) {
        return showAlert('Please enter a valid 10-digit contact number.', 'error');
      }
      if (additionalContactNumber && !/^\d{10}$/.test(additionalContactNumber)) {
        return showAlert('Additional contact number must be 10 digits.', 'error');
      }

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Connecting...';

      const wakeTimer = setTimeout(() => {
        showAlert('⏳ Server is starting up, please wait 30–60 seconds. Do NOT refresh the page.', 'info');
        btn.textContent = 'Please wait...';
      }, 4000);

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, contactNumber, additionalContactNumber, cetRegistrationNumber, password })
        });
        clearTimeout(wakeTimer);
        const data = await res.json();

        if (!res.ok) {
          btn.disabled = false;
          btn.textContent = 'Register & Get OTP';
          return showAlert(data.message, 'error');
        }

        showAlert('OTP sent to your email! Redirecting...', 'success');
        localStorage.setItem('pendingEmail', email);
        setTimeout(() => window.location.href = 'verify-otp.html', 1500);
      } catch (err) {
        clearTimeout(wakeTimer);
        btn.disabled = false;
        btn.textContent = 'Register & Get OTP';
        showAlert('Cannot connect to server. Please try again.', 'error');
      }
    }
  </script>
</body>
</html>
