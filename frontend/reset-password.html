<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - VESASC Exam Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="img/logo.png" alt="VESASC" style="height:80px; width:auto; margin-bottom:10px;">
        <h1>Reset Password</h1>
        <p>Enter your new password below</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <div id="formSection">
       <div class="form-group">
  <label>New Password</label>
  <div style="position:relative;">
    <input type="password" id="password" placeholder="Minimum 6 characters" style="padding-right:44px;">
    <span onclick="togglePassword('password', this)" style="
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      cursor:pointer; font-size:18px; color:#6c757d; user-select:none;
    ">👁</span>
  </div>
</div>

<div class="form-group">
  <label>Confirm New Password</label>
  <div style="position:relative;">
    <input type="password" id="confirmPassword" placeholder="Repeat your new password" style="padding-right:44px;">
    <span onclick="togglePassword('confirmPassword', this)" style="
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      cursor:pointer; font-size:18px; color:#6c757d; user-select:none;
    ">👁</span>
  </div>
</div>

        <button class="btn btn-primary" id="submitBtn" onclick="handleReset()">
          Reset Password
        </button>
      </div>

      <p class="text-center mt-2">
        <a href="index.html" class="link">← Back to Login</a>
      </p>
    </div>
  </div>

  <script>

    function togglePassword(fieldId, icon) {
  const input = document.getElementById(fieldId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = '🙈';
  } else {
    input.type = 'password';
    icon.textContent = '👁';
  }
}
   // const API = 'https://vesasc-examination-app.onrender.com/api';
   const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:5000/api' 
  : 'https://vesasc-examination-app.onrender.com/api';

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // If no token in URL, show error immediately
    if (!token) {
      const box = document.getElementById('alertBox');
      box.textContent = 'Invalid or missing reset link. Please request a new one.';
      box.className = 'alert alert-error show';
      document.getElementById('formSection').style.display = 'none';
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert alert-${type} show`;
    }

    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!password || !confirmPassword) {
        return showAlert('Please fill in both fields.', 'error');
      }

      if (password.length < 6) {
        return showAlert('Password must be at least 6 characters.', 'error');
      }

      if (password !== confirmPassword) {
        return showAlert('Passwords do not match.', 'error');
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (!res.ok) {
          btn.disabled = false;
          btn.textContent = 'Reset Password';
          return showAlert(data.message, 'error');
        }

        showAlert(data.message, 'success');
        document.getElementById('formSection').style.display = 'none';

        // Redirect to login after 3 seconds
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 3000);

      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
        showAlert('Connection error. Please try again.', 'error');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleReset();
    });
  </script>
</body>
</html>
