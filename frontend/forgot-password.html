<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - VESASC Exam Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="img/logo.png" alt="VESASC" style="height:80px; width:auto; margin-bottom:10px;">
        <h1>Forgot Password</h1>
        <p>Enter your registered email to receive a reset link</p>
      </div>

      <div id="alertBox" class="alert"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
      </div>

      <button class="btn btn-primary" id="submitBtn" onclick="handleForgotPassword()">
        Send Reset Link
      </button>

      <p class="text-center mt-2">
        <a href="index.html" class="link">← Back to Login</a>
      </p>
    </div>
  </div>

  <script>
    //const API = 'https://vesasc-examination-app.onrender.com/api';
   const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:5000/api' 
  : 'https://vesasc-examination-app.onrender.com/api';

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert alert-${type} show`;
    }

    async function handleForgotPassword() {
      const email = document.getElementById('email').value.trim();
      if (!email) return showAlert('Please enter your email address.', 'error');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(`${API}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (!res.ok) {
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
          return showAlert(data.message, 'error');
        }

        showAlert(data.message, 'success');
        btn.textContent = 'Link Sent!';
        // Disable button to prevent spam
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
        }, 30000);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
        showAlert('Connection error. Please try again.', 'error');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleForgotPassword();
    });
  </script>
</body>
</html>
