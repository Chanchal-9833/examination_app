<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Results - Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .filter-row {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .grade-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .score-bar-mini {
      height: 6px; background: var(--border); border-radius: 6px;
      overflow: hidden; width: 80px; display: inline-block; vertical-align: middle;
    }
    .score-bar-fill {
      height: 100%; background: var(--primary); border-radius: 6px;
    }
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: white; border-radius: 10px; padding: 16px; text-align: center;
      box-shadow: var(--shadow);
    }
    .summary-card .val { font-size: 24px; font-weight: 700; font-family: var(--mono); color: var(--primary); }
    .summary-card .lbl { font-size: 12px; color: var(--text-muted); }
    @media (max-width: 768px) {
      .summary-cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="brand" style="display:flex; align-items:center; gap:10px;">
      <img src="../img/logo.png" alt="VESASC" style="height:38px; width:auto;">
      <span>Student Results</span>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <a href="dashboard.html" style="color:white; font-size:14px;">← Dashboard</a>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>

  <div style="padding:28px; max-width: 1200px; margin: 0 auto;">

    <div class="summary-cards" id="summaryCards">
      <div class="summary-card"><div class="val" id="sumTotal">—</div><div class="lbl">Total Submissions</div></div>
      <div class="summary-card"><div class="val" id="sumAvg">—</div><div class="lbl">Average Score %</div></div>
      <div class="summary-card"><div class="val" id="sumPass">—</div><div class="lbl">Pass (≥45%)</div></div>
      <div class="summary-card"><div class="val" id="sumFail">—</div><div class="lbl">Fail (&lt;45%)</div></div>
    </div>

    <div class="results-header">
      <h1 class="page-title" style="margin-bottom:0;">All Submissions</h1>
      <button class="btn btn-secondary btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

    <div class="filter-row">
      <select id="setFilter" onchange="loadResults()"
        style="padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; min-width:220px;">
        <option value="">All Exam Sets</option>
      </select>
      <input type="text" id="searchInput" placeholder="🔍 Search name or email..."
        style="padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; min-width:250px;"
        oninput="filterResults()">
      <select id="gradeFilter" onchange="filterResults()"
        style="padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px;">
        <option value="">All Grades</option>
        <option value="A+">A+</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
      </select>
    </div>

    <div id="alertBox" class="alert"></div>

    <div style="overflow-x: auto;">
      <table class="data-table" id="resultsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Exam Set</th>
            <th>Score</th>
            <th>%</th>
            <th>Grade</th>
            <th>Correct</th>
            <th>Wrong</th>
            <th>Attempted</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr><td colspan="11" style="text-align:center; padding:24px; color:var(--text-muted);">Loading results...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    const API = 'https://vesasc-examination-app.onrender.com/api';
    const adminToken = localStorage.getItem('adminToken');
    if (!adminToken) window.location.href = 'login.html';
    const headers = { Authorization: `Bearer ${adminToken}` };

    let allResults = [];

    function logout() {
      localStorage.removeItem('adminToken');
      window.location.href = 'login.html';
    }

    function getGrade(pct) {
      if (pct >= 90) return 'A+';
      if (pct >= 75) return 'A';
      if (pct >= 60) return 'B';
      if (pct >= 45) return 'C';
      return 'D';
    }

    function getGradeStyle(grade) {
      const map = {
        'A+': 'background:#e8f5e9; color:#1b5e20',
        'A': 'background:#e8f5e9; color:#2e7d32',
        'B': 'background:#e3f2fd; color:#1565c0',
        'C': 'background:#fff3e0; color:#e65100',
        'D': 'background:#ffebee; color:#c62828'
      };
      return map[grade] || '';
    }

    // Check for setId in URL
    const urlParams = new URLSearchParams(window.location.search);
    const presetSetId = urlParams.get('setId');

    // Load exam sets for filter dropdown
    async function loadExamSets() {
      try {
        const res = await fetch(`${API}/admin/exam-sets`, { headers });
        const data = await res.json();
        const sel = document.getElementById('setFilter');
        (data.examSets || []).forEach(s => {
          const opt = document.createElement('option');
          opt.value = s._id; opt.textContent = s.name;
          sel.appendChild(opt);
        });
        if (presetSetId) { sel.value = presetSetId; }
      } catch(e) {}
    }

    async function loadResults() {
      const setId = document.getElementById('setFilter')?.value || '';
        const url = `${API}/admin/results?limit=500${setId ? '&examSetId=' + setId : ''}`;
        try {
        const res = await fetch(url, { headers });
        if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; return; }
        const data = await res.json();
        allResults = data.results || [];
        updateSummary();
        renderTable(allResults);
      } catch (e) {
        document.getElementById('alertBox').textContent = 'Failed to load results.';
        document.getElementById('alertBox').className = 'alert alert-error show';
      }
    }

    function updateSummary() {
      const total = allResults.length;
      const pass = allResults.filter(r => r.percentage >= 45).length;
      const avgPct = total > 0 ? (allResults.reduce((sum, r) => sum + r.percentage, 0) / total).toFixed(1) : '—';
      document.getElementById('sumTotal').textContent = total;
      document.getElementById('sumAvg').textContent = total ? avgPct + '%' : '—';
      document.getElementById('sumPass').textContent = pass;
      document.getElementById('sumFail').textContent = total - pass;
    }

    function renderTable(results) {
      const tbody = document.getElementById('resultsBody');
      if (!results.length) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center; padding:24px; color:var(--text-muted);">No results found.</td></tr>';
        return;
      }
      tbody.innerHTML = results.map((r, i) => {
        const pct = r.percentage.toFixed(1);
        const grade = getGrade(r.percentage);
        const date = new Date(r.submittedAt).toLocaleString();
        const barWidth = Math.min(r.percentage, 100).toFixed(0);
        return `
          <tr>
            <td>${i + 1}</td>
            <td><strong>${r.studentName}</strong></td>
            <td style="font-size:13px;">${r.studentEmail}</td>
            <td><span style="background:#e8eaf6;color:#1a237e;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600;">${r.examSetName || '—'}</span></td>
            <td>
              <strong>${r.score}</strong>/${r.maxScore}
              <div class="score-bar-mini"><div class="score-bar-fill" style="width:${barWidth}%"></div></div>
            </td>
            <td><strong>${pct}%</strong></td>
            <td><span class="grade-pill" style="${getGradeStyle(grade)}">${grade}</span></td>
            <td style="color:var(--success); font-weight:700;">${r.correct}</td>
            <td style="color:var(--danger); font-weight:700;">${r.incorrect}</td>
            <td>${r.attempted}/${r.totalQuestions}</td>
            <td style="font-size:12px; color:var(--text-muted);">${date}</td>
          </tr>
        `;
      }).join('');
    }

    function filterResults() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const gradeFilter = document.getElementById('gradeFilter').value;
      const filtered = allResults.filter(r => {
        const matchSearch = !search || r.studentName.toLowerCase().includes(search) || r.studentEmail.toLowerCase().includes(search);
        const matchGrade = !gradeFilter || getGrade(r.percentage) === gradeFilter;
        return matchSearch && matchGrade;
      });
      renderTable(filtered);
    }

    function exportCSV() {
      const hdrs = ['Name', 'Email', 'ExamSet', 'Score', 'MaxScore', 'Percentage', 'Grade', 'Correct', 'Incorrect', 'Attempted', 'Total', 'SubmittedAt'];
      const rows = allResults.map(r => [
        r.studentName, r.studentEmail, r.examSetName || '',
        r.score, r.maxScore, r.percentage.toFixed(2), getGrade(r.percentage),
        r.correct, r.incorrect, r.attempted, r.totalQuestions,
        new Date(r.submittedAt).toLocaleString()
      ]);
      const csv = [hdrs, ...rows].map(row => row.map(v => `"${v}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `exam-results-${Date.now()}.csv`;
      a.click(); URL.revokeObjectURL(url);
    }

    loadExamSets().then(() => loadResults());
  </script>
</body>
</html>
